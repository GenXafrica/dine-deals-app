    <script src="https://js.paystack.co/v1/inline.js"></script>

    <script>
      const VERBOSE_LOGS =
        /[?&]debug=1/.test(window.location.search) ||
        window.location.hostname === 'localhost';

      const debugLog = (...args) => { if (VERBOSE_LOGS) console.log(...args); };
      const debugWarn = (...args) => { if (VERBOSE_LOGS) console.warn(...args); };
      const debugError = (...args) => { console.error(...args); };

      debugLog('INDEX_VERSION v9');
    </script>

    <script>
      (function () {
        const PROD_HOST = 'app.dinedeals.co.za';
        const onProd = window.location.hostname === PROD_HOST;
        const isAdminPath = window.location.pathname.startsWith('/admin');

        try {
          if ('serviceWorker' in navigator) {
            const origRegister = navigator.serviceWorker.register?.bind(navigator.serviceWorker);
            if (origRegister) {
              navigator.serviceWorker.register = function (scriptURL, options) {
                if (onProd && !isAdminPath) return origRegister(scriptURL, options);
                debugWarn('[SW-Guard] Blocked register:', scriptURL);
                return Promise.resolve();
              };
            }
          }
        } catch {}
      })();
    </script>

  <body>

  </body>
